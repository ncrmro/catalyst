AWSTemplateFormatVersion: '2010-09-09'
Description: 'Catalyst AWS Onboarding: Enables Cross-Account Provisioning via OIDC Federation'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Catalyst Cluster Connection
        Parameters:
          - OIDCIssuerHost
          - ExternalID
      - Label:
          default: Customization
        Parameters:
          - ResourcePrefix
          - AllowedRegion
    ParameterLabels:
      OIDCIssuerHost:
        default: OIDC Issuer Host
      ExternalID:
        default: External ID
      ResourcePrefix:
        default: Resource Prefix
      AllowedRegion:
        default: Allowed AWS Region

Parameters:
  OIDCIssuerHost:
    Type: String
    Description: 'The OIDC Issuer hostname without https:// (e.g., oidc.eks.us-east-1.amazonaws.com/id/XXXXX)'
  ExternalID:
    Type: String
    Description: 'A unique External ID for security (used in the trust policy)'
  ResourcePrefix:
    Type: String
    Default: 'Catalyst'
    Description: 'Prefix for created IAM roles and resources (default: Catalyst)'
  AllowedRegion:
    Type: String
    Default: 'us-east-1'
    Description: 'The AWS region where Catalyst is allowed to provision resources'

Resources:
  # 1. Register Catalyst's Kubernetes Cluster as an OIDC Identity Provider in IAM
  CatalystOIDCProvider:
    Type: 'AWS::IAM::OIDCProvider'
    Properties:
      Url: !Sub 'https://${OIDCIssuerHost}'
      ClientIdList:
        - 'sts.amazonaws.com'
      ThumbprintList:
        # Standard root CA thumbprints for most OIDC providers (e.g., Google, EKS, etc.)
        # If your issuer uses a custom CA, you may need to update this.
        - '9e99a48a9960b14926bb7f3b02e22da2b0ab7280'

  # 2. Create the Cross-Account Provisioning Role
  # This role is assumed by Catalyst's Crossplane provider via OIDC federation.
  CatalystProvisioningRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub '${ResourcePrefix}-ProvisioningRole'
      Tags:
        - Key: catalyst-managed
          Value: 'true'
        - Key: catalyst-component
          Value: crossplane-provisioning
      # SECURITY: AssumeRolePolicyDocument is a JSON string so Fn::Sub can
      # substitute ${OIDCIssuerHost} into the condition keys. CloudFormation
      # does not allow intrinsic functions as YAML map keys.
      AssumeRolePolicyDocument: !Sub |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": {
                "Federated": "${CatalystOIDCProvider}"
              },
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringEquals": {
                  "${OIDCIssuerHost}:sub": "system:serviceaccount:crossplane-system:provider-aws",
                  "${OIDCIssuerHost}:aud": "sts.amazonaws.com"
                }
              }
            }
          ]
        }

      # 3. Inline Provisioning Policy (Least Privilege)
      Policies:
        - PolicyName: CatalystProvisioningPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Networking and Compute: VPCs, EC2 Instances, Load Balancers
              - Sid: NetworkingAndCompute
                Effect: Allow
                Action:
                  - 'ec2:RunInstances'
                  - 'ec2:TerminateInstances'
                  - 'ec2:DescribeInstances'
                  - 'ec2:*Vpc*'
                  - 'ec2:*Subnet*'
                  - 'ec2:*SecurityGroup*'
                  - 'ec2:*InternetGateway*'
                  - 'ec2:*RouteTable*'
                  - 'ec2:*Route'
                  - 'ec2:*NatGateway*'
                  - 'ec2:*Address*'
                  - 'ec2:*Tags*'
                  - 'ec2:DescribeAvailabilityZones'
                  - 'ec2:DescribeImages'
                  - 'ec2:DescribeKeyPairs'
                  - 'ec2:CreateKeyPair'
                  - 'ec2:DeleteKeyPair'
                  - 'ec2:*Volume*'
                  - 'ec2:AttachVolume'
                  - 'ec2:DetachVolume'
                  - 'elasticloadbalancing:*'
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:RequestedRegion': !Ref AllowedRegion

              # Auto Scaling: Cluster scaling
              - Sid: AutoScaling
                Effect: Allow
                Action:
                  - 'autoscaling:*AutoScalingGroup*'
                  - 'autoscaling:*LaunchConfiguration*'
                  - 'autoscaling:*Tags*'
                  - 'autoscaling:SetDesiredCapacity'
                  - 'autoscaling:DescribeLaunchConfigurations'
                Resource: '*'
                Condition:
                  StringEquals:
                    'aws:RequestedRegion': !Ref AllowedRegion

              # IAM Roles and Profiles: Scoped to Catalyst-K8s-*
              # Catalyst needs to create roles for the managed cluster nodes.
              - Sid: IAMRolesAndProfiles
                Effect: Allow
                Action:
                  - 'iam:CreateRole'
                  - 'iam:DeleteRole'
                  - 'iam:GetRole'
                  - 'iam:TagRole'
                  - 'iam:AttachRolePolicy'
                  - 'iam:DetachRolePolicy'
                  - 'iam:PutRolePolicy'
                  - 'iam:DeleteRolePolicy'
                  - 'iam:GetRolePolicy'
                  - 'iam:CreateInstanceProfile'
                  - 'iam:DeleteInstanceProfile'
                  - 'iam:AddRoleToInstanceProfile'
                  - 'iam:RemoveRoleFromInstanceProfile'
                  - 'iam:GetInstanceProfile'
                  - 'iam:ListInstanceProfilesForRole'
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/Catalyst-K8s-*'
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:instance-profile/Catalyst-K8s-*'

              # PassRole: Most sensitive permission, strictly guarded.
              # Allows Catalyst to attach its created roles to EC2 instances.
              - Sid: PassRoleToK8sNodes
                Effect: Allow
                Action: 'iam:PassRole'
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/Catalyst-K8s-*'
                Condition:
                  StringEquals:
                    'iam:PassedToService':
                      - 'ec2.amazonaws.com'
                      - 'autoscaling.amazonaws.com'
                    'aws:ResourceTag/catalyst-managed': 'true'

Outputs:
  ProvisioningRoleArn:
    Description: 'The ARN of the Cross-Account Provisioning Role'
    Value: !GetAtt CatalystProvisioningRole.Arn
  OIDCProviderArn:
    Description: 'The ARN of the OIDC Provider'
    Value: !Ref CatalystOIDCProvider
